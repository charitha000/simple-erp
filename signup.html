<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - The Fluid Scholar</title>
    <link rel="stylesheet" href="./src/style.css">
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/MotionPathPlugin.min.js"></script>
    <style>
        body { background-color: #f8fafc; }
        :root.dark body { background-color: #0f172a; }
        svg { overflow: visible; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300 relative">

    <!-- Dark Mode Toggle -->
    <div class="absolute top-6 right-6 z-50">
        <button id="dark-mode-toggle" class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-300 transition-colors focus:outline-none shadow-sm flex-shrink-0">
            <span class="sr-only">Toggle dark mode</span>
            <span id="dark-mode-thumb" class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 ease-in-out translate-x-1"></span>
        </button>
    </div>

    <!-- Outermost container using responsive layout -->
    <div class="max-w-5xl w-full bg-white dark:bg-slate-900 rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-none overflow-hidden flex flex-col md:flex-row border border-slate-100 dark:border-slate-800 transition-colors duration-300">
        
        <!-- Left Column: The Interactive Canvas -->
        <div class="w-full md:w-1/2 p-8 md:p-12 lg:p-16 flex items-center justify-center relative bg-slate-50 dark:bg-slate-800 border-r border-slate-100 dark:border-slate-700 overflow-hidden transition-colors duration-300">
            <div class="absolute inset-0 z-0 opacity-50 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-100 dark:from-slate-700 via-transparent to-transparent transition-colors duration-300"></div>
            
            <svg viewBox="0 0 500 500" class="w-full max-w-sm h-auto relative z-10" id="canvas">
                <defs>
                    <filter id="shadow" dx="0" dy="10">
                        <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.1"/>
                    </filter>
                </defs>

                <!-- Shape 1: Blob (Teal) -->
                <g class="character" id="char1">
                    <path class="body" d="M120,380 C60,380 40,330 60,260 C80,190 130,200 160,200 C190,200 240,240 230,290 C220,360 170,380 120,380 Z" fill="#14b8a6" filter="url(#shadow)"/>
                    <g class="eye-group">
                        <circle class="eye-white" cx="120" cy="270" r="24" fill="#ffffff" />
                        <circle class="pupil" cx="120" cy="270" r="10" fill="#0f172a" />
                    </g>
                    <g class="eye-group">
                        <circle class="eye-white" cx="180" cy="260" r="18" fill="#ffffff" />
                        <circle class="pupil" cx="180" cy="260" r="7" fill="#0f172a" />
                    </g>
                </g>

                <!-- Shape 2: Tall Rectangle (Orange) -->
                <g class="character" id="char2">
                    <rect class="body" x="260" y="80" width="130" height="280" rx="65" fill="#f97316" filter="url(#shadow)"/>
                    <g class="eye-group">
                        <circle class="eye-white" cx="300" cy="180" r="22" fill="#ffffff" />
                        <circle class="pupil" cx="300" cy="180" r="9" fill="#0f172a" />
                    </g>
                    <g class="eye-group">
                        <circle class="eye-white" cx="355" cy="180" r="22" fill="#ffffff" />
                        <circle class="pupil" cx="355" cy="180" r="9" fill="#0f172a" />
                    </g>
                </g>

                <!-- The Curved Path for the bicycle (Matches user's drawn arc) -->
                <path id="rider-path" d="M -150,380 C -20,200 120,40 300,50 C 450,60 550,100 650,-20" stroke="#cbd5e1" class="dark:stroke-slate-600 transition-colors duration-300" stroke-width="4" stroke-dasharray="20 10" fill="none"/>

                <!-- Bicycle Rider -->
                <g id="bicycle-container">
                    <g id="bicycle">
                        <!-- Back Wheel -->
                        <g transform="translate(0, 0)">
                            <g class="wheel">
                                <circle cx="0" cy="0" r="20" fill="none" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="5"/>
                                <line x1="0" y1="-20" x2="0" y2="20" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="2"/>
                                <line x1="-20" y1="0" x2="20" y2="0" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="2"/>
                            </g>
                        </g>

                        <!-- Front Wheel -->
                        <g transform="translate(80, 0)">
                            <g class="wheel">
                                <circle cx="0" cy="0" r="20" fill="none" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="5"/>
                                <line x1="0" y1="-20" x2="0" y2="20" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="2"/>
                                <line x1="-20" y1="0" x2="20" y2="0" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="2"/>
                            </g>
                        </g>

                        <!-- Frame -->
                        <path d="M0,0 L30,-40 L70,-40 L80,0 M30,-40 L20,-60 M70,-40 L65,-60" stroke="#14b8a6" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M0,0 L70,-40 M30,-40 L80,0" stroke="#14b8a6" stroke-width="6" fill="none" stroke-linecap="round"/>
                        
                        <!-- Seat and Handlebar -->
                        <path d="M10,-60 L30,-60" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
                        <path d="M55,-60 L85,-65" stroke="#a855f7" stroke-width="6" stroke-linecap="round"/>

                        <!-- Rider -->
                        <g id="rider">
                            <!-- Head -->
                            <circle cx="45" cy="-100" r="12" class="fill-[#0f172a] dark:fill-slate-300 transition-colors duration-300"/>
                            <!-- Body -->
                            <path d="M45,-85 L25,-55" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="12" stroke-linecap="round"/>
                            <!-- Arm -->
                            <path d="M45,-80 L65,-60" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="8" stroke-linecap="round"/>
                            <!-- Leg -->
                            <path d="M25,-55 L40,-20 L20,0" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" id="rider-leg"/>
                        </g>
                    </g>
                    
                    <!-- Speed lines -->
                    <g id="speed-lines" opacity="0">
                        <line x1="-50" y1="-30" x2="-90" y2="-30" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
                        <line x1="-40" y1="-10" x2="-70" y2="-10" stroke="#14b8a6" stroke-width="3" stroke-linecap="round"/>
                        <line x1="-60" y1="-60" x2="-110" y2="-60" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
                    </g>
                </g>

                <!-- Shape 3: Semi-circle (Purple) -->
                <g class="character" id="char3">
                    <path class="body" d="M210,440 A 110 110 0 0 1 430,440 Z" fill="#a855f7" filter="url(#shadow)"/>
                    <g class="eye-group">
                        <circle class="eye-white" cx="320" cy="380" r="20" fill="#ffffff" />
                        <circle class="pupil" cx="320" cy="380" r="8" fill="#0f172a" />
                    </g>
                </g>
            </svg>
        </div>

        <!-- Right Column: The Form -->
        <div class="w-full md:w-1/2 p-8 sm:p-12 lg:p-16 flex flex-col justify-center transition-colors duration-300">
            
            <div class="max-w-md w-full mx-auto relative z-10 flex-col flex space-y-5">
                <div class="mb-6">
                    <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-2 tracking-tight transition-colors">Create an Account</h1>
                    <p class="text-slate-500 dark:text-slate-400 font-medium transition-colors">Join us to experience endless learning.</p>
                </div>

                <form id="signup-form" class="space-y-5">
                    
                    <!-- Name Input -->
                    <div>
                        <label for="name" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 transition-colors">Full Name</label>
                        <input type="text" id="name" class="w-full px-4 py-3 bg-slate-50/50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-slate-900 dark:focus:ring-emerald-500 focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Alex Scholar" required>
                    </div>

                    <!-- Email Input -->
                    <div>
                        <label for="email" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 transition-colors">Email</label>
                        <input type="email" id="email" class="w-full px-4 py-3 bg-slate-50/50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-slate-900 dark:focus:ring-emerald-500 focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Enter your email" autocomplete="email" required>
                    </div>

                    <!-- Password Input -->
                    <div>
                        <label for="password" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 transition-colors">Password (Min 10 chars)</label>
                        <div class="relative">
                            <input type="password" id="password" minlength="10" class="w-full px-4 py-3 bg-slate-50/50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-slate-900 dark:focus:ring-emerald-500 focus:border-transparent transition-all pr-12 placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="••••••••••" required>
                            
                            <!-- Show/Hide Button -->
                            <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 px-4 flex items-center text-slate-400 dark:text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 focus:outline-none transition-colors">
                                <!-- Eye Open Icon -->
                                <svg id="icon-show" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                <!-- Eye Closed Icon -->
                                <svg id="icon-hide" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="pt-4 space-y-4">
                        <button type="submit" class="w-full bg-slate-900 dark:bg-emerald-500 text-white dark:text-slate-900 font-semibold py-3.5 rounded-xl border-2 border-slate-900 dark:border-emerald-500 hover:bg-slate-800 dark:hover:bg-emerald-400 hover:border-slate-800 dark:hover:border-emerald-400 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 dark:focus:ring-emerald-500 dark:focus:ring-offset-slate-900 shadow-lg shadow-slate-900/20 dark:shadow-emerald-500/20 active:scale-[0.98]">
                            Create Account
                        </button>
                        
                        <button type="button" id="google-login-btn" class="w-full bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-semibold py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all flex items-center justify-center space-x-3 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-200 dark:focus:ring-slate-700 dark:focus:ring-offset-slate-900 active:scale-[0.98]">
                            <svg class="w-5 h-5" viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            <span>Sign up with Google</span>
                        </button>
                    </div>

                    <div id="signup-error" class="hidden bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 text-sm font-medium px-4 py-3 rounded-lg border border-red-200 dark:border-red-800 mt-4 transition-colors">
                        Invalid sign up details.
                    </div>
                    <div id="signup-success" class="hidden bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 text-sm font-medium px-4 py-3 rounded-lg border border-emerald-200 dark:border-emerald-800 mt-4 transition-colors">
                        Account created! Check your email or try logging in.
                    </div>

                    <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-6 pt-2 font-medium transition-colors">
                        Already have an account? <a href="index.html" class="font-semibold text-slate-900 dark:text-white hover:text-slate-600 dark:hover:text-emerald-400 transition-colors">Log in</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <!-- Core Interactive Logic -->
    <script type="module" src="./src/main.js"></script>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const supabaseUrl = 'https://zxwhjermpiyofdqubblq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4d2hqZXJtcGl5b2ZkcXViYmxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTE5NjQsImV4cCI6MjA5MDQ2Nzk2NH0.vI2Q351FjRDFYe4aMUMyg_vy-bXG1EL6ZohZlwhnxzs';
        const supabase = createClient(supabaseUrl, supabaseKey);

        gsap.registerPlugin(MotionPathPlugin);
        gsap.config({ force3D: true });

        // DOM Elements
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const nameInput = document.getElementById('name');
        const toggleBtn = document.getElementById('toggle-password');
        const iconShow = document.getElementById('icon-show');
        const iconHide = document.getElementById('icon-hide');
        const eyes = document.querySelectorAll('.eye-white');
        const pupils = document.querySelectorAll('.pupil');

        // State Tracking
        let isFocusActive = false;
        let isPasswordFocused = false;
        let isPasswordVisible = false;

        const eyeData = [];
        eyes.forEach((eye, index) => {
            const pupil = pupils[index];
            const r = parseFloat(eye.getAttribute('r'));
            const pupilR = parseFloat(pupil.getAttribute('r'));
            const maxDist = r - pupilR - 2; 
            eyeData.push({ maxDist });
            gsap.set(eye, { transformOrigin: "50% 50%" });
            gsap.set(pupil, { transformOrigin: "50% 50%" });
        });

        // Idle floating
        gsap.to('.character', {
            y: 10,
            duration: 2,
            yoyo: true,
            repeat: -1,
            ease: "sine.inOut",
            stagger: { each: 0.2, from: "start" }
        });

        // Mouse Tracking
        window.addEventListener('mousemove', (e) => {
            if (isFocusActive || isPasswordFocused) return;
            const mouseX = e.clientX, mouseY = e.clientY;
            eyes.forEach((eye, index) => {
                const rect = eye.getBoundingClientRect();
                const eyeCenterX = rect.left + rect.width / 2, eyeCenterY = rect.top + rect.height / 2;
                const angle = Math.atan2(mouseY - eyeCenterY, mouseX - eyeCenterX);
                const distToMouse = Math.hypot(mouseX - eyeCenterX, mouseY - eyeCenterY);
                const moveDist = Math.min(distToMouse * 0.04, eyeData[index].maxDist);
                gsap.to(pupils[index], { x: Math.cos(angle) * moveDist, y: Math.sin(angle) * moveDist, duration: 0.3, ease: "power2.out", overwrite: "auto" });
                gsap.to(eye, { scaleY: 1, duration: 0.2 });
            });
        });

        // Focus Inputs (Look Right)
        const lookRightFocus = () => {
            isFocusActive = true;
            isPasswordFocused = false;
            eyes.forEach((eye, index) => {
                gsap.to(pupils[index], { x: eyeData[index].maxDist, y: 0, duration: 0.4, ease: "back.out(1.2)", overwrite: "auto" });
                gsap.to(eye, { scaleY: 1, duration: 0.3 });
                gsap.to(pupils[index], { scaleY: 1, duration: 0.3 });
            });
        };

        const blurHandler = () => {
            isFocusActive = false;
            isPasswordFocused = false;
            eyes.forEach((eye, index) => {
                gsap.to(eye, { scaleY: 1, duration: 0.3, ease: "power2.out" });
                gsap.to(pupils[index], { x: 0, y: 0, scaleY: 1, duration: 0.4, ease: "power2.out" });
            });
        };

        nameInput.addEventListener('focus', lookRightFocus);
        nameInput.addEventListener('blur', blurHandler);
        emailInput.addEventListener('focus', lookRightFocus);
        emailInput.addEventListener('blur', blurHandler);

        // Password Focus (Close Eyes)
        passwordInput.addEventListener('focus', () => {
            isPasswordFocused = true;
            isFocusActive = false;
            updatePasswordState();
        });
        passwordInput.addEventListener('blur', blurHandler);

        // Toggle Password
        toggleBtn.addEventListener('mousedown', e => e.preventDefault());
        toggleBtn.addEventListener('click', () => {
            isPasswordVisible = !isPasswordVisible;
            if (isPasswordVisible) {
                passwordInput.type = "text";
                iconShow.classList.remove('hidden');
                iconHide.classList.add('hidden');
            } else {
                passwordInput.type = "password";
                iconShow.classList.add('hidden');
                iconHide.classList.remove('hidden');
            }
            if (isPasswordFocused) updatePasswordState();
        });

        function updatePasswordState() {
            if (isPasswordVisible) {
                eyes.forEach((eye, index) => {
                    gsap.to(eye, { scaleY: 1, duration: 0.4, ease: "back.out(2)" });
                    gsap.to(pupils[index], { scaleY: 1, x: eyeData[index].maxDist, y: 0, duration: 0.4, ease: "back.out(2)" });
                });
            } else {
                eyes.forEach((eye, index) => {
                    gsap.to(eye, { scaleY: 0.05, duration: 0.3, ease: "power2.out" });
                    gsap.to(pupils[index], { scaleY: 0.05, x: 0, y: 0, duration: 0.3, ease: "power2.out" });
                });
            }
        }

        // Setup Bicycle Motion Path
        // We set up a paused animation that spans the entire path
        const bikeTween = gsap.to('#bicycle-container', {
            duration: 1,
            paused: true,
            ease: "none",
            motionPath: {
                path: "#rider-path",
                align: "#rider-path",
                alignOrigin: [0.5, 1], // Bottom center of the bike aligns to the path
                autoRotate: true
            }
        });

        // Initialize bike at start of path
        bikeTween.progress(0);

        // Bicycle Animation Logic Based on Password Input
        passwordInput.addEventListener('input', (e) => {
            const val = e.target.value;
            const targetChars = 10;
            const progress = Math.min(val.length / targetChars, 1); // Max progress 1
            
            // Move bicycle along the curved path based on typing progress!
            gsap.to(bikeTween, { progress: progress, duration: 0.5, ease: "power2.out" });

            // Spin wheels aggressively while typing
            gsap.to('.wheel', { 
                rotation: "+=360", 
                transformOrigin: "50% 50%",
                duration: 0.4, 
                ease: "none" 
            });

            // Animate leg pedaling
            gsap.to('#rider-leg', {
                y: -15,
                duration: 0.1,
                yoyo: true,
                repeat: 3,
                ease: "sine.inOut"
            });

            // Show speed lines if typing moderately
            if (val.length > 0) {
                gsap.to('#speed-lines', { opacity: progress, duration: 0.2 });
                gsap.fromTo('#speed-lines', 
                    { x: 0 }, 
                    { x: -30, duration: 0.3, yoyo: true, repeat: 1 }
                );
            } else {
                gsap.to('#speed-lines', { opacity: 0, duration: 0.2 });
            }
            
            // Slight tilt forward of the bike container if going fast
            gsap.to('#bicycle', {
                rotation: val.length > 3 && val.length < 10 ? 5 : 0, 
                transformOrigin: "center bottom",
                duration: 0.3
            });
            
            // Move Path dashed line backward to create speed illusion
            gsap.to('.bike-path', {
                strokeDashoffset: "-=50",
                duration: 0.4,
                ease: "none"
            });
        });

        // Form Submission
        const signupForm = document.getElementById('signup-form');
        const signupError = document.getElementById('signup-error');
        const signupSuccess = document.getElementById('signup-success');
        
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            signupError.classList.add('hidden');
            signupSuccess.classList.add('hidden');
            
            const emailVal = emailInput.value.trim();
            const passVal = passwordInput.value;
            const nameVal = nameInput.value.trim();

            if (passVal.length < 10) {
                signupError.innerText = "Password must be at least 10 characters long.";
                signupError.classList.remove('hidden');
                return;
            }

            const submitBtn = signupForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = "Creating Account...";
            submitBtn.style.opacity = "0.7";
            submitBtn.style.pointerEvents = "none";

            const { data, error } = await supabase.auth.signUp({
                email: emailVal,
                password: passVal,
                options: {
                    data: { full_name: nameVal }
                }
            });

            if (error) {
                signupError.innerText = error.message;
                signupError.classList.remove('hidden');
                eyes.forEach(eye => gsap.fromTo(eye, { x: -5 }, { x: 5, duration: 0.1, yoyo: true, repeat: 3, ease: "linear" }));
                submitBtn.innerText = originalText;
                submitBtn.style.opacity = "1";
                submitBtn.style.pointerEvents = "auto";
                return;
            }
            
            signupSuccess.classList.remove('hidden');
            eyes.forEach((eye, index) => {
                gsap.to(eye, { scaleY: 1.2, duration: 0.3 });
                gsap.to(pupils[index], { scaleY: 1.2, x: 0, y: 0, duration: 0.3 });
            });

            setTimeout(() => {
                // Determine whether to transition or stay (Supabase requires email confirmation by default)
                // For this demo, let's just go to dashboard if session exists, else re-enable button
                if (data.session) {
                    window.location.href = import.meta.env.BASE_URL + 'dashboard.html';
                } else {
                    submitBtn.innerText = originalText;
                    submitBtn.style.opacity = "1";
                    submitBtn.style.pointerEvents = "auto";
                    signupForm.reset();
                }
            }, 1000);
        });

        // Google Sign-up Flow
        const googleLoginBtn = document.getElementById('google-login-btn');
        if (googleLoginBtn) {
            googleLoginBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                signupError.classList.add('hidden');
                
                const originalText = googleLoginBtn.querySelector('span').innerText;
                googleLoginBtn.querySelector('span').innerText = "Redirecting...";
                googleLoginBtn.style.pointerEvents = "none";
                googleLoginBtn.style.opacity = "0.7";

                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + import.meta.env.BASE_URL + 'dashboard.html'
                    }
                });

                if (error) {
                    signupError.innerText = error.message;
                    signupError.classList.remove('hidden');
                    googleLoginBtn.querySelector('span').innerText = originalText;
                    googleLoginBtn.style.pointerEvents = "auto";
                    googleLoginBtn.style.opacity = "1";
                }
            });
        }
    </script>
</body>
</html>
