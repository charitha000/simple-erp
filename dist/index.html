<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Login</title>
    <!-- Tailwind CSS (Vite bundle) -->
    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        /* Base off-white background */
        body { 
            background-color: #f8fafc; /* slate-50 */
        }
        :root.dark body {
            background-color: #0f172a; /* slate-900 */
        }
        /* Custom styles to prevent layout shifts */
        svg {
            overflow: visible;
        }
    </style>
  <script type="module" crossorigin src="/simple-erp/assets/main-B4OOIWlI.js"></script>
  <link rel="modulepreload" crossorigin href="/simple-erp/assets/main-B8DfoAiC.js">
  <link rel="stylesheet" crossorigin href="/simple-erp/assets/main-CQqjQvTT.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300 relative">

    <!-- Dark Mode Toggle -->
    <div class="absolute top-6 right-6 z-50">
        <button id="dark-mode-toggle" class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-300 transition-colors focus:outline-none shadow-sm flex-shrink-0">
            <span class="sr-only">Toggle dark mode</span>
            <span id="dark-mode-thumb" class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 ease-in-out translate-x-1"></span>
        </button>
    </div>

    <!-- Outermost container using responsive layout -->
    <div class="max-w-5xl w-full bg-white dark:bg-slate-900 rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-none overflow-hidden flex flex-col lg:flex-row border border-slate-100 dark:border-slate-800 transition-colors duration-300">
        
        <!-- Left Column: The Interactive Canvas -->
        <div class="w-full lg:w-1/2 p-8 md:p-12 lg:p-16 flex items-center justify-center relative bg-slate-50 dark:bg-slate-800 border-r border-slate-100 dark:border-slate-700 overflow-hidden transition-colors duration-300">
            <div class="absolute inset-0 z-0 opacity-50 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-100 dark:from-slate-700 via-transparent to-transparent transition-colors duration-300"></div>
            
            <!-- Canvas container for SVG and Matter.js debug if needed -->
            <div id="animation-container" class="w-full max-w-sm h-auto relative z-10 aspect-[8/7]">
                <!-- SVG Canvas for Animation -->
                <svg viewBox="0 0 400 350" class="w-full h-full absolute inset-0 text-slate-900 dark:text-slate-100 transition-colors duration-300" id="canvas">
                    
                    <!-- Platform -->
                    <line x1="200" y1="80" x2="360" y2="80" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                    
                    <!-- Cup -->
                    <g id="cup" transform="translate(280, 45)" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="fill-[#eab308] dark:fill-yellow-600 transition-colors">
                        <path d="M -15 0 L 15 0 L 10 20 L -10 20 Z" />
                        <!-- handles -->
                        <path d="M -15 5 C -25 5 -25 15 -10 15" fill="none"/>
                        <path d="M 15 5 C 25 5 25 15 10 15" fill="none"/>
                        <!-- base -->
                        <line x1="0" y1="20" x2="0" y2="35" />
                        <line x1="-15" y1="35" x2="15" y2="35" />
                    </g>

                    <!-- Confetti (hidden initially) -->
                    <g id="confetti" opacity="0">
                        <circle cx="200" cy="20" r="3" fill="#ef4444"/>
                        <circle cx="230" cy="40" r="4" fill="#3b82f6"/>
                        <circle cx="300" cy="15" r="3.5" fill="#10b981"/>
                        <circle cx="330" cy="35" r="3" fill="#8b5cf6"/>
                        <rect x="250" y="10" width="6" height="6" fill="#f59e0b" transform="rotate(45 253 13)"/>
                        <rect x="280" y="25" width="5" height="5" fill="#ec4899" transform="rotate(20 282 27)"/>
                        <rect x="210" y="60" width="7" height="4" fill="#6366f1" transform="rotate(-30 213 62)"/>
                        <rect x="340" y="60" width="4" height="7" fill="#14b8a6" transform="rotate(15 342 63)"/>
                    </g>

                    <!-- Ladder will be drawn dynamically via JS to match physics bodies -->
                    <g id="ladder-group" stroke="currentColor" stroke-width="4" stroke-linecap="round"></g>

                    <!-- IK Man (Used for smooth climbing) -->
                    <g id="ik-climber" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
                        <path id="ik-left-leg" d="M 0 0 L 0 0 L 0 0" />
                        <path id="ik-right-leg" d="M 0 0 L 0 0 L 0 0" />
                        <path id="ik-left-arm" d="M 0 0 L 0 0 L 0 0" />
                        <path id="ik-right-arm" d="M 0 0 L 0 0 L 0 0" />
                        <line id="ik-torso" x1="0" y1="0" x2="0" y2="0" />
                        <circle id="ik-head" cx="0" cy="0" r="14" class="fill-[#f8fafc] dark:fill-slate-800 transition-colors" />
                    </g>

                    <!-- Ragdoll Man (Used for physics falling, hidden initially) -->
                    <g id="ragdoll" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" class="hidden">
                        <line id="rb-torso" x1="0" y1="0" x2="0" y2="0" />
                        <line id="rb-left-arm-upper" x1="0" y1="0" x2="0" y2="0" />
                        <line id="rb-left-arm-lower" x1="0" y1="0" x2="0" y2="0" />
                        <line id="rb-right-arm-upper" x1="0" y1="0" x2="0" y2="0" />
                        <line id="rb-right-arm-lower" x1="0" y1="0" x2="0" y2="0" />
                        <line id="rb-left-leg-upper" x1="0" y1="0" x2="0" y2="0" />
                        <line id="rb-left-leg-lower" x1="0" y1="0" x2="0" y2="0" />
                        <line id="rb-right-leg-upper" x1="0" y1="0" x2="0" y2="0" />
                        <line id="rb-right-leg-lower" x1="0" y1="0" x2="0" y2="0" />
                        <circle id="rb-head" cx="0" cy="0" r="14" class="fill-[#f8fafc] dark:fill-slate-800 transition-colors" />
                    </g>
                </svg>
            </div>
        </div>

        <!-- Right Column: The Form -->
        <div class="w-full lg:w-1/2 p-8 sm:p-12 lg:p-16 flex flex-col justify-center transition-colors duration-300">
            
            <div class="max-w-md w-full mx-auto relative z-10 flex-col flex space-y-6">
                <div class="mb-4">
                    <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-2 tracking-tight transition-colors">Welcome back!</h1>
                    <p class="text-slate-500 dark:text-slate-400 font-medium transition-colors">Please enter your details to sign in.</p>
                </div>

                <form id="login-form" class="space-y-6">
                    
                    <!-- Email Input -->
                    <div>
                        <label for="email" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 transition-colors">Email</label>
                        <input type="email" id="email" class="w-full px-4 py-3 bg-slate-50/50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-slate-900 dark:focus:ring-emerald-500 focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Enter your email" autocomplete="email">
                    </div>

                    <!-- Password Input -->
                    <div>
                        <label for="password" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 transition-colors">Password</label>
                        <div class="relative">
                            <input type="password" id="password" class="w-full px-4 py-3 bg-slate-50/50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-slate-900 dark:focus:ring-emerald-500 focus:border-transparent transition-all pr-12 placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="••••••••">
                            
                            <!-- Show/Hide Button -->
                            <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 px-4 flex items-center text-slate-400 dark:text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 focus:outline-none transition-colors">
                                <!-- Eye Open Icon (Hidden by default) -->
                                <svg id="icon-show" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                <!-- Eye Closed Icon -->
                                <svg id="icon-hide" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Options -->
                    <div class="flex items-center justify-between pt-1">
                        <label class="flex items-center space-x-2 cursor-pointer group">
                            <input type="checkbox" class="w-4 h-4 rounded border-slate-300 dark:border-slate-600 dark:bg-slate-800 text-slate-900 dark:text-emerald-500 focus:ring-slate-900 dark:focus:ring-emerald-500 focus:ring-offset-0 transition-colors">
                            <span class="text-sm font-medium text-slate-600 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-slate-200 transition-colors">Remember for 30 days</span>
                        </label>
                        <a href="#" id="forgot-pwd-link" class="text-sm font-semibold text-slate-900 dark:text-white hover:text-slate-600 dark:hover:text-emerald-400 transition-colors">Forgot password?</a>
                    </div>

                    <!-- Action Buttons -->
                    <div class="pt-4 space-y-4">
                        <button type="submit" class="w-full bg-slate-900 dark:bg-emerald-500 text-white dark:text-slate-900 font-semibold py-3.5 rounded-xl border-2 border-slate-900 dark:border-emerald-500 hover:bg-slate-800 dark:hover:bg-emerald-400 hover:border-slate-800 dark:hover:border-emerald-400 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 dark:focus:ring-emerald-500 dark:focus:ring-offset-slate-900 shadow-lg shadow-slate-900/20 dark:shadow-emerald-500/20 active:scale-[0.98]">
                            Log in
                        </button>
                        
                        <button type="button" id="google-login-btn" class="w-full bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-semibold py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all flex items-center justify-center space-x-3 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-200 dark:focus:ring-slate-700 dark:focus:ring-offset-slate-900 active:scale-[0.98]">
                            <svg class="w-5 h-5" viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            <span>Log in with Google</span>
                        </button>
                    </div>

                    <div id="login-error" class="hidden bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 text-sm font-medium px-4 py-3 rounded-lg border border-red-200 dark:border-red-800">
                        Invalid email or password. Please try again.
                    </div>

                    <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-6 pt-2 font-medium transition-colors">
                        Don't have an account? <a href="signup.html" class="font-semibold text-slate-900 dark:text-white hover:text-slate-600 dark:hover:text-emerald-400 transition-colors">Sign up</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <!-- Core Interactive Logic -->
</body>
</html>
