<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - The Fluid Scholar</title>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/MotionPathPlugin.min.js"></script>
    <style>
        body { background-color: #f8fafc; }
        :root.dark body { background-color: #0f172a; }
        svg { overflow: visible; }
    </style>
  <script type="module" crossorigin src="/simple-erp/assets/signup-DZsl__HT.js"></script>
  <link rel="modulepreload" crossorigin href="/simple-erp/assets/main-BYV5zqgn.js">
  <link rel="stylesheet" crossorigin href="/simple-erp/assets/main-MXBTFMtE.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300 relative">

    <!-- Dark Mode Toggle -->
    <div class="absolute top-6 right-6 z-50">
        <button id="dark-mode-toggle" class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-300 transition-colors focus:outline-none shadow-sm flex-shrink-0">
            <span class="sr-only">Toggle dark mode</span>
            <span id="dark-mode-thumb" class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 ease-in-out translate-x-1"></span>
        </button>
    </div>

    <!-- Outermost container using responsive layout -->
    <div class="max-w-5xl w-full bg-white dark:bg-slate-900 rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-none overflow-hidden flex flex-col md:flex-row border border-slate-100 dark:border-slate-800 transition-colors duration-300">
        
        <!-- Left Column: The Interactive Canvas -->
        <div class="w-full md:w-1/2 p-8 md:p-12 lg:p-16 flex items-center justify-center relative bg-slate-50 dark:bg-slate-800 border-r border-slate-100 dark:border-slate-700 overflow-hidden transition-colors duration-300">
            <div class="absolute inset-0 z-0 opacity-50 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-100 dark:from-slate-700 via-transparent to-transparent transition-colors duration-300"></div>
            
            <svg viewBox="0 0 500 500" class="w-full max-w-sm h-auto relative z-10" id="canvas">
                <defs>
                    <filter id="shadow" dx="0" dy="10">
                        <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.1"/>
                    </filter>
                </defs>

                <!-- Shape 1: Blob (Teal) -->
                <g class="character" id="char1">
                    <path class="body" d="M120,380 C60,380 40,330 60,260 C80,190 130,200 160,200 C190,200 240,240 230,290 C220,360 170,380 120,380 Z" fill="#14b8a6" filter="url(#shadow)"/>
                    <g class="eye-group">
                        <circle class="eye-white" cx="120" cy="270" r="24" fill="#ffffff" />
                        <circle class="pupil" cx="120" cy="270" r="10" fill="#0f172a" />
                    </g>
                    <g class="eye-group">
                        <circle class="eye-white" cx="180" cy="260" r="18" fill="#ffffff" />
                        <circle class="pupil" cx="180" cy="260" r="7" fill="#0f172a" />
                    </g>
                </g>

                <!-- Shape 2: Tall Rectangle (Orange) -->
                <g class="character" id="char2">
                    <rect class="body" x="260" y="80" width="130" height="280" rx="65" fill="#f97316" filter="url(#shadow)"/>
                    <g class="eye-group">
                        <circle class="eye-white" cx="300" cy="180" r="22" fill="#ffffff" />
                        <circle class="pupil" cx="300" cy="180" r="9" fill="#0f172a" />
                    </g>
                    <g class="eye-group">
                        <circle class="eye-white" cx="355" cy="180" r="22" fill="#ffffff" />
                        <circle class="pupil" cx="355" cy="180" r="9" fill="#0f172a" />
                    </g>
                </g>

                <!-- The Curved Path for the bicycle (Matches user's drawn arc) -->
                <path id="rider-path" d="M -150,380 C -20,200 120,40 300,50 C 450,60 550,100 650,-20" stroke="#cbd5e1" class="dark:stroke-slate-600 transition-colors duration-300" stroke-width="4" stroke-dasharray="20 10" fill="none"/>

                <!-- Bicycle Rider -->
                <g id="bicycle-container">
                    <g id="bicycle">
                        <!-- Back Wheel -->
                        <g transform="translate(0, 0)">
                            <g class="wheel">
                                <circle cx="0" cy="0" r="20" fill="none" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="5"/>
                                <line x1="0" y1="-20" x2="0" y2="20" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="2"/>
                                <line x1="-20" y1="0" x2="20" y2="0" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="2"/>
                            </g>
                        </g>

                        <!-- Front Wheel -->
                        <g transform="translate(80, 0)">
                            <g class="wheel">
                                <circle cx="0" cy="0" r="20" fill="none" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="5"/>
                                <line x1="0" y1="-20" x2="0" y2="20" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="2"/>
                                <line x1="-20" y1="0" x2="20" y2="0" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="2"/>
                            </g>
                        </g>

                        <!-- Frame -->
                        <path d="M0,0 L30,-40 L70,-40 L80,0 M30,-40 L20,-60 M70,-40 L65,-60" stroke="#14b8a6" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M0,0 L70,-40 M30,-40 L80,0" stroke="#14b8a6" stroke-width="6" fill="none" stroke-linecap="round"/>
                        
                        <!-- Seat and Handlebar -->
                        <path d="M10,-60 L30,-60" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
                        <path d="M55,-60 L85,-65" stroke="#a855f7" stroke-width="6" stroke-linecap="round"/>

                        <!-- Rider -->
                        <g id="rider">
                            <!-- Head -->
                            <circle cx="45" cy="-100" r="12" class="fill-[#0f172a] dark:fill-slate-300 transition-colors duration-300"/>
                            <!-- Body -->
                            <path d="M45,-85 L25,-55" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="12" stroke-linecap="round"/>
                            <!-- Arm -->
                            <path d="M45,-80 L65,-60" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="8" stroke-linecap="round"/>
                            <!-- Leg -->
                            <path d="M25,-55 L40,-20 L20,0" class="stroke-[#0f172a] dark:stroke-slate-300 transition-colors duration-300" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" id="rider-leg"/>
                        </g>
                    </g>
                    
                    <!-- Speed lines -->
                    <g id="speed-lines" opacity="0">
                        <line x1="-50" y1="-30" x2="-90" y2="-30" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
                        <line x1="-40" y1="-10" x2="-70" y2="-10" stroke="#14b8a6" stroke-width="3" stroke-linecap="round"/>
                        <line x1="-60" y1="-60" x2="-110" y2="-60" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
                    </g>
                </g>

                <!-- Shape 3: Semi-circle (Purple) -->
                <g class="character" id="char3">
                    <path class="body" d="M210,440 A 110 110 0 0 1 430,440 Z" fill="#a855f7" filter="url(#shadow)"/>
                    <g class="eye-group">
                        <circle class="eye-white" cx="320" cy="380" r="20" fill="#ffffff" />
                        <circle class="pupil" cx="320" cy="380" r="8" fill="#0f172a" />
                    </g>
                </g>
            </svg>
        </div>

        <!-- Right Column: The Form -->
        <div class="w-full md:w-1/2 p-8 sm:p-12 lg:p-16 flex flex-col justify-center transition-colors duration-300">
            
            <div class="max-w-md w-full mx-auto relative z-10 flex-col flex space-y-5">
                <div class="mb-6">
                    <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-2 tracking-tight transition-colors">Create an Account</h1>
                    <p class="text-slate-500 dark:text-slate-400 font-medium transition-colors">Join us to experience endless learning.</p>
                </div>

                <form id="signup-form" class="space-y-5">
                    
                    <!-- Name Input -->
                    <div>
                        <label for="name" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 transition-colors">Full Name</label>
                        <input type="text" id="name" class="w-full px-4 py-3 bg-slate-50/50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-slate-900 dark:focus:ring-emerald-500 focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Alex Scholar" required>
                    </div>

                    <!-- Email Input -->
                    <div>
                        <label for="email" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 transition-colors">Email</label>
                        <input type="email" id="email" class="w-full px-4 py-3 bg-slate-50/50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-slate-900 dark:focus:ring-emerald-500 focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Enter your email" autocomplete="email" required>
                    </div>

                    <!-- Password Input -->
                    <div>
                        <label for="password" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 transition-colors">Password (Min 10 chars)</label>
                        <div class="relative">
                            <input type="password" id="password" minlength="10" class="w-full px-4 py-3 bg-slate-50/50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-slate-900 dark:focus:ring-emerald-500 focus:border-transparent transition-all pr-12 placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="••••••••••" required>
                            
                            <!-- Show/Hide Button -->
                            <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 px-4 flex items-center text-slate-400 dark:text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 focus:outline-none transition-colors">
                                <!-- Eye Open Icon -->
                                <svg id="icon-show" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                <!-- Eye Closed Icon -->
                                <svg id="icon-hide" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="pt-4">
                        <button type="submit" class="w-full bg-slate-900 dark:bg-emerald-500 text-white dark:text-slate-900 font-semibold py-3.5 rounded-xl border-2 border-slate-900 dark:border-emerald-500 hover:bg-slate-800 dark:hover:bg-emerald-400 hover:border-slate-800 dark:hover:border-emerald-400 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 dark:focus:ring-emerald-500 dark:focus:ring-offset-slate-900 shadow-lg shadow-slate-900/20 dark:shadow-emerald-500/20 active:scale-[0.98]">
                            Create Account
                        </button>
                    </div>

                    <div id="signup-error" class="hidden bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 text-sm font-medium px-4 py-3 rounded-lg border border-red-200 dark:border-red-800 mt-4 transition-colors">
                        Invalid sign up details.
                    </div>
                    <div id="signup-success" class="hidden bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 text-sm font-medium px-4 py-3 rounded-lg border border-emerald-200 dark:border-emerald-800 mt-4 transition-colors">
                        Account created! Check your email or try logging in.
                    </div>

                    <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-6 pt-2 font-medium transition-colors">
                        Already have an account? <a href="index.html" class="font-semibold text-slate-900 dark:text-white hover:text-slate-600 dark:hover:text-emerald-400 transition-colors">Log in</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <!-- Core Interactive Logic -->
</body>
</html>
